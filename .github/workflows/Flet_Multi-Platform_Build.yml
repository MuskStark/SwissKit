name: Flet Multi-Platform Build

on:
  push:
    tags:
      - 'v*'  # ељУжО®йАБдї•vеЉАе§ізЪДж†Зз≠ЊжЧґиІ¶еПСпЉМе¶Вv1.0.0
    branches:
      - main  # дЄіжЧґжЈїеК†пЉЪжО®йАБеИ∞mainеИЖжФѓжЧґдєЯиІ¶еПСпЉИжµЛиѓХзФ®пЉЙ
  workflow_dispatch:  # дЄіжЧґжЈїеК†пЉЪжЙЛеК®иІ¶еПС
    inputs:
      test_version:
        description: 'жµЛиѓХзЙИжЬђеПЈ'
        required: true
        default: 'v0.1.0-test'

jobs:
  build:
    strategy:
      matrix:
        include:
          # macOS Intel 64дљН
          - os: macos-latest
            target: macos-intel
            artifact_name: swisskit-macos-intel
            installer_ext: .dmg
            python_arch: x64
            flutter_target: macos
          
          # macOS Apple Silicon (M1/M2)
          - os: macos-latest
            target: macos-arm
            artifact_name: swisskit-macos-arm
            installer_ext: .dmg
            python_arch: arm64
            flutter_target: macos
          
          # Windows 64дљН
          - os: windows-latest
            target: windows-x64
            artifact_name: swisskit-windows-x64
            installer_ext: .exe
            python_arch: x64
            flutter_target: windows
          
          # Linux 64дљН
          - os: ubuntu-latest
            target: linux-x64
            artifact_name: swisskit-linux-x64
            installer_ext: .tar.gz
            python_arch: x64
            flutter_target: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.python_arch }}

      # иЃЊзљЃ Flutter (flet build йЬАи¶Б)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # еЃЙи£Е uv
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies with uv
        run: |
          # дљњзФ® uv sync еРМж≠•дЊЭиµЦпЉИжО®иНРжЦєеЉПпЉМдљњзФ® uv.lockпЉЙ
          uv sync
          
          # з°ЃдњЭ flet еЈ≤еЃЙи£ЕпЉИе¶ВжЮЬдЄНеЬ® pyproject.toml дЄ≠пЉЙ
          if ! uv run python -c "import flet" > /dev/null 2>&1; then
            uv add flet
          fi
        shell: bash

      # йАЪзФ®жЮДеїЇж≠•й™§
      - name: Build with flet build
        run: |
          # иОЈеПЦзЙИжЬђеПЈпЉИжФѓжМБжЙЛеК®иІ¶еПСжЧґдљњзФ®иЊУеЕ•зЪДзЙИжЬђеПЈпЉЙ
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.test_version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          
          # дљњзФ® uv run жЭ•ињРи°М flet build
          uv run flet build ${{ matrix.flutter_target }}
        shell: bash

      # macOS еРОе§ДзРЖеТМжЙУеМЕ
      - name: Package for macOS
        if: matrix.os == 'macos-latest'
        run: |
          # еИЫеїЇDMGеЃЙи£ЕеМЕ
          brew install create-dmg
          
          # зІїеК®.appжЦЗдїґеИ∞дЄіжЧґзЫЃељХ
          mkdir -p dmg_temp
          cp -R build/macos/SwissKit.app dmg_temp/
          
          # еИЫеїЇDMG
          create-dmg \
            --volname "SwissKit ${{ github.ref_name }}" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "SwissKit.app" 200 190 \
            --hide-extension "SwissKit.app" \
            --app-drop-link 600 185 \
            --background-color "#f0f0f0" \
            "build/${{ matrix.artifact_name }}.dmg" \
            "dmg_temp/"

      # Windows еРОе§ДзРЖ
      - name: Package for Windows
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: run: |
        $env:PYTHONIOENCODING = "utf-8"
        $env:PYTHONUTF8 = "1"
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        flet build [your-target]
        # йЗНеСљеРНexeжЦЗдїґ
        move "build\windows\SwissKit.exe" "build\${{ matrix.artifact_name }}.exe"

      # Linux еРОе§ДзРЖеТМжЙУеМЕ
      - name: Package for Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          # еЃЙи£Ез≥їзїЯдЊЭиµЦ
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libatk-bridge2.0-dev \
            libdrm2 \
            libgtk-3-dev \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libxss1 \
            libxtst6 \
            xvfb
          
          # еИЫеїЇAppImage
          wget -c https://github.com/probonopd/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          
          # еИЫеїЇAppDirзїУжЮД
          mkdir -p AppDir/usr/bin
          cp build/linux/SwissKit AppDir/usr/bin/
          
          # еИЫеїЇdesktopжЦЗдїґ
          cat > AppDir/swisskit.desktop << EOF
          [Desktop Entry]
          Type=Application
          Name=SwissKit
          Exec=SwissKit
          Icon=swisskit
          Categories=Utility;
          Comment=SwissKit Application
          EOF
          
          # е¶ВжЮЬжЬЙеЫЊж†ЗжЦЗдїґпЉМе§НеИґеИ∞AppDir
          if [ -f "src/assets/icon.png" ]; then
            cp src/assets/icon.png AppDir/swisskit.png
          fi
          
          # жЮДеїЇAppImage
          export ARCH=x86_64
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage
          
          # йЗНеСљеРНAppImage
          mv SwissKit-*.AppImage build/SwissKit.AppImage
          
          # еИЫеїЇtar.gzеМЕпЉИеП¶дЄАзІНеИЖеПСжЦєеЉПпЉЙ
          cd build
          tar -czf ${{ matrix.artifact_name }}.tar.gz SwissKit
          cd ..

      # дЄКдЉ†жЮДеїЇдЇІзЙ©
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            build/${{ matrix.artifact_name }}${{ matrix.installer_ext }}
            build/SwissKit.AppImage

  # еИЫеїЇGitHub Release
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display structure of downloaded files
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.test_version || github.ref_name }}
          name: Release ${{ github.event.inputs.test_version || github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.event.inputs.test_version || github.ref_name, 'test') || contains(github.event.inputs.test_version || github.ref_name, 'alpha') || contains(github.event.inputs.test_version || github.ref_name, 'beta') }}
          body: |
            ## дЄЛиљљиѓіжШО
            
            - **macOS Intel**: дЄЛиљљ `swisskit-macos-intel.dmg`
            - **macOS Apple Silicon**: дЄЛиљљ `swisskit-macos-arm.dmg`
            - **Windows 64дљН**: дЄЛиљљ `swisskit-windows-x64.exe`
            - **Linux**: дЄЛиљљ `SwissKit.AppImage` жИЦ `swisskit-linux-x64.tar.gz`
            
            ### Linux дљњзФ®жЦєж≥Х
            ```bash
            # AppImageжЦєеЉП
            chmod +x SwissKit.AppImage
            ./SwissKit.AppImage
            
            # tar.gzжЦєеЉП
            tar -xzf swisskit-linux-x64.tar.gz
            ./SwissKit
            ```
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN || secrets.GITHUB_TOKEN }}
